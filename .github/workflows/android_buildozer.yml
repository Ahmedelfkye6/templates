name: Android Buildozer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Cloud Code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        echo "Updating system and installing dependencies..."
        sudo apt-get update -y
        sudo apt-get upgrade -y
        sudo apt-get install -y --no-install-recommends build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev tar lld libncurses5
        echo "Installing Python packages with pip..."
        pip install --upgrade pip
        pip install buildozer cython virtualenv kivy

    - name: Build Android APK
      run: |
        echo "Building APK with Buildozer..."
        buildozer android debug --no-interaction

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoFX-Android-APK
        path: bin/*.apk
