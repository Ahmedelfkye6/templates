name: Android Buildozer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: $HOME/android-sdk
      PATH: $PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        echo "Updating system and installing necessary packages..."
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libffi-dev uuid-dev tar lld libncurses5 || sudo apt-get install -y libncurses6

    - name: Install Python Packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv kivy

    - name: Install Android Command Line Tools
      run: |
        echo "Installing Android Command Line Tools..."
        mkdir -p $ANDROID_HOME/cmdline-tools
        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -o commandlinetools.zip
        unzip commandlinetools.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

    - name: Accept Android Licenses
      run: |
        echo "Accepting Android SDK licenses..."
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses

    - name: Install Android Tools
      run: |
        echo "Installing Android Build-Tools and Platform Tools..."
        sdkmanager "platform-tools" "build-tools;37.0.0"

