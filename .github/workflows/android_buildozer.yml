name: Android Buildozer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5  # استخدام الإصدار الأحدث

    - name: Set up JDK 17
      uses: actions/setup-java@v5  # استخدام الإصدار الأحدث
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v6  # استخدام الإصدار الأحدث
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        echo "Updating system and installing necessary packages..."
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libffi-dev uuid-dev tar lld libncurses5 || sudo apt-get install -y libncurses6

    - name: Install Python Packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv kivy

    - name: Validate Buildozer Spec File
      run: |
        echo "Validating and cleaning 'buildozer.spec' file..."
        if grep -q "^android.permissions" buildozer.spec; then
          sed -i '/^android.permissions/!b;:a;N;/\nandroid.permissions/D;ba' buildozer.spec
        fi
        echo "Validation completed successfully."

    - name: Build Android APK
      run: |
        echo "Building APK using Buildozer..."
        buildozer android debug --no-interaction

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoFX-Android-APK
        path: bin/*.apk
